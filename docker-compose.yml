services:
  bot:
    build: .
    image: ${DOCKER_IMAGE:-zarplata-subscribe-bot:latest}
    container_name: zarplata-subscribe-bot
    restart: unless-stopped
    env_file:
      - ./config/.env
    environment:
      BOT_HOST: 0.0.0.0
      BOT_PORT: 8000
      DATABASE_PATH: /app/data/database.db
    ports:
      - "127.0.0.1:${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: zarplata-subscribe-caddy
    restart: unless-stopped
    depends_on:
      - bot
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
